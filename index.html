<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>💖 A Special Question for You 💖</title>
  <!-- Google Fonts for a romantic, modern touch -->
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #ffe6f0 0%, #ffd9e8 100%);
      font-family: 'Quicksand', 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* main card container */
    .proposal-card {
      max-width: 600px;
      width: 100%;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(3px);
      border-radius: 48px;
      box-shadow: 0 30px 45px rgba(255, 80, 120, 0.2), 0 8px 18px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      text-align: center;
      padding: 2rem 2rem 2.5rem;
      transition: transform 0.3s ease;
      border: 1px solid rgba(255, 200, 220, 0.7);
      z-index: 10;
    }

    .proposal-card:hover {
      transform: scale(1.01);
    }

    /* decorative heart header */
    .heart-icon {
      font-size: 4rem;
      animation: pulse 1.6s infinite ease;
      display: inline-block;
      margin-bottom: 0.5rem;
    }

    @keyframes pulse {
      0% { transform: scale(0.95); text-shadow: 0 0 0 rgba(255, 80, 120, 0.3);}
      70% { transform: scale(1.1); text-shadow: 0 0 12px #ff99bb;}
      100% { transform: scale(0.95); text-shadow: 0 0 0 rgba(255, 80, 120, 0);}
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #c43a6b;
      margin: 1rem 0 0.5rem;
      letter-spacing: -0.3px;
      word-break: keep-all;
    }

    .sub-message {
      font-size: 1.18rem;
      color: #9b4b6b;
      font-weight: 500;
      background: rgba(255, 235, 240, 0.7);
      display: inline-block;
      padding: 0.4rem 1.2rem;
      border-radius: 60px;
      margin-bottom: 1.5rem;
      backdrop-filter: blur(2px);
    }

    .question {
      font-size: 1.7rem;
      font-weight: 700;
      color: #b32d5a;
      margin: 0.8rem 0 1rem;
      background: #fff0f5;
      display: inline-block;
      padding: 0.5rem 1.6rem;
      border-radius: 60px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.02);
    }

    .name-highlight {
      background: linear-gradient(120deg, #ffb7c5, #ff8aa8);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      font-weight: 800;
    }

    .message {
      font-size: 1rem;
      line-height: 1.5;
      color: #5a3e4a;
      background: rgba(255,250,252,0.8);
      padding: 1rem 1.2rem;
      border-radius: 32px;
      margin: 1.5rem 0;
      font-weight: 500;
    }

    /* Buttons container */
    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.2rem;
      margin: 1.8rem 0 1.2rem;
    }

    .btn {
      border: none;
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 1.3rem;
      padding: 0.8rem 2rem;
      border-radius: 60px;
      cursor: pointer;
      transition: 0.2s ease;
      box-shadow: 0 6px 0 rgba(0,0,0,0.08);
      background: white;
      color: #b32d5a;
      border: 1px solid #ffbfcf;
      min-width: 140px;
    }

    .btn-yes {
      background: #ff6f91;
      color: white;
      border: none;
      box-shadow: 0 6px 0 #a53f5c;
    }

    .btn-yes:hover, .btn-yes:active {
      background: #ff4874;
      transform: translateY(-2px);
      box-shadow: 0 8px 0 #a53f5c;
    }

    .btn-no {
      background: #f2e3e8;
      color: #a15c74;
      border: 1px solid #f5bfd0;
    }

    .btn-no:hover {
      background: #ffdee8;
      transform: translateY(-2px);
    }

    /* response message area */
    .response-area {
      margin-top: 1.5rem;
      background: #ffffffcc;
      border-radius: 42px;
      padding: 0.8rem;
      font-size: 1.2rem;
      font-weight: 600;
      color: #b32d5a;
      transition: all 0.3s;
      min-height: 85px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .hidden {
      display: none;
    }

    /* small gif / emoji row */
    .extra-love {
      font-size: 1.8rem;
      letter-spacing: 6px;
      margin-top: 1rem;
      opacity: 0.8;
    }

    /* mobile friendly touches */
    @media (max-width: 550px) {
      .proposal-card {
        padding: 1.5rem;
      }
      h1 {
        font-size: 1.7rem;
      }
      .question {
        font-size: 1.3rem;
        padding: 0.3rem 1rem;
      }
      .btn {
        font-size: 1.1rem;
        padding: 0.7rem 1rem;
        min-width: 120px;
      }
      .message {
        font-size: 0.9rem;
      }
      .heart-icon {
        font-size: 3rem;
      }
    }

    /* canvas for confetti - fullscreen overlay */
    #confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1000;
    }

    /* small sparkle effect for buttons */
    button:active {
      transform: scale(0.97);
    }
    footer {
      font-size: 0.7rem;
      margin-top: 1.8rem;
      opacity: 0.6;
      color: #cc7a97;
    }
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="proposal-card">
  <div class="heart-icon">💖💫💖</div>
  <h1>Hey <span class="name-highlight" id="crushName">You</span> 💌</h1>
  <div class="sub-message">✨ something has been on my heart ✨</div>

  <div class="question">
    💕 Will you be mine? 💕
  </div>

  <div class="message">
    Every moment with you feels like a beautiful melody. <br>
    Your smile makes my whole world brighter. <br>
    I've gathered all my courage just to ask you... 🌸
  </div>

  <div class="buttons">
    <button class="btn btn-yes" id="yesButton">💖 Yes! 💖</button>
    <button class="btn btn-no" id="noButton">😅 No, but... 😅</button>
  </div>

  <div class="response-area" id="responseMsg">
    <span>🌈 tap your answer 🌈</span>
  </div>
  <div class="extra-love">
    🎀 🌸 🎀
  </div>
  <footer>✨ my heart is waiting ✨</footer>
</div>

<script>
  (function() {
    // ----- confetti animation logic (mobile friendly, performant) -----
    const canvas = document.getElementById('confetti-canvas');
    let ctx = canvas.getContext('2d');
    let animationId = null;
    let particles = [];
    let active = false;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', () => {
      resizeCanvas();
      if (active) {
        // redraw existing particles? to avoid distortion we keep particles relative?
        // but resize while confetti active can cause weird mapping; we just reset if needed? 
        // simply reinit canvas dimensions, particles remain but coordinates might become off-screen;
        // To keep smooth: better reset confetti if active but it's okay since few secs only. 
        // we can also re-run config for particles if needed, but usually not disturbing.
      }
    });

    class ConfettiParticle {
      constructor(x, y, size, color, speedX, speedY, rotation, rotationSpeed) {
        this.x = x;
        this.y = y;
        this.size = size;
        this.color = color;
        this.speedX = speedX;
        this.speedY = speedY;
        this.rotation = rotation;
        this.rotationSpeed = rotationSpeed;
        this.gravity = 0.2;
        this.drag = 0.98;
      }
      update() {
        this.speedX *= this.drag;
        this.speedY += this.gravity;
        this.x += this.speedX;
        this.y += this.speedY;
        this.rotation += this.rotationSpeed;
        return this.y < canvas.height + 100 && this.x > -100 && this.x < canvas.width + 100;
      }
      draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.fillStyle = this.color;
        ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size * 0.6);
        ctx.restore();
      }
    }

    function startConfetti(duration = 3800) {
      if (active) {
        // stop current and restart fresh
        stopConfetti();
      }
      active = true;
      resizeCanvas();
      particles = [];
      const colors = ['#ff5e7e', '#ff8aa8', '#ffb347', '#ff6f91', '#ffadc2', '#ffd966', '#c44569', '#f8acd4', '#a2e3c4'];
      const particleCount = Math.min(150, Math.floor(window.innerWidth / 8)); // dynamic count for mobile/desktop balance
      for (let i = 0; i < particleCount; i++) {
        const size = 6 + Math.random() * 9;
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height - canvas.height * 0.2;
        const speedX = (Math.random() - 0.5) * 5;
        const speedY = (Math.random() * -3) - 1.5;
        const rotation = Math.random() * Math.PI * 2;
        const rotationSpeed = (Math.random() - 0.5) * 0.2;
        const color = colors[Math.floor(Math.random() * colors.length)];
        particles.push(new ConfettiParticle(x, y, size, color, speedX, speedY, rotation, rotationSpeed));
      }
      
      function render() {
        if (!active) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let allAlive = false;
        for (let i = 0; i < particles.length; i++) {
          const alive = particles[i].update();
          particles[i].draw(ctx);
          if (alive) allAlive = true;
        }
        if (allAlive && active) {
          animationId = requestAnimationFrame(render);
        } else {
          // particles all finished
          stopConfetti();
        }
      }
      render();
      
      // stop after duration
      setTimeout(() => {
        if (active) stopConfetti();
      }, duration);
    }
    
    function stopConfetti() {
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
      active = false;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles = [];
    }

    // ----- bonus: small burst of hearts/particles effect extra -----
    function burstMiniSparkle() {
      // tiny extra effect: create extra short confetti wave, but also we can reuse: 
      startConfetti(1800);
    }

    // ----- interactive proposal logic with responses, funny 'no' option behaviour -----
    const yesBtn = document.getElementById('yesButton');
    const noBtn = document.getElementById('noButton');
    const responseDiv = document.getElementById('responseMsg');
    const crushNameSpan = document.getElementById('crushName');
    
    // set a cute dynamic name or let user custom? default 'cutie' but you can change 'my crush' to actual name
    // we can ask? but for proposal, it's personalizable: use any 'cutie/beautiful'
    // we set local default to 'Gorgeous' but can be updated (you can edit variable)
    const defaultName = "Sweetheart";
    crushNameSpan.innerText = defaultName;
    
    // Use a small count to make 'no' button teasing
    let noClickCount = 0;
    const noResponses = [
      "😳 Are you sure? Maybe rethink? 🥺",
      "💞 But my heart flutters only for you! 💞",
      "🤭 You're just teasing me, right? Click Yes! 💖",
      "😘 I know you feel the spark... say Yes! ✨",
      "💗 No doesn't exist in my dictionary when it's you 💗",
      "🌸 Click 'Yes!' and make my day magical 🌸"
    ];
    
    // after multiple no clicks, eventually displays a hopeful message but doesn't force yes, but encourages!
    function updateNoResponse() {
      if (noClickCount === 0) {
        responseDiv.innerHTML = `<span>💭 hmm, take your time... but i’m hopeful 💭</span>`;
      } else if (noClickCount < noResponses.length) {
        responseDiv.innerHTML = `<span>${noResponses[noClickCount-1]} 💕</span>`;
      } else {
        responseDiv.innerHTML = `<span>🥺 I'll always wait for you, no pressure... but my heart is yours 💘</span>`;
      }
      // also shake no button playfully for attention? but subtle 
      noBtn.style.transform = "scale(0.98)";
      setTimeout(() => { if(noBtn) noBtn.style.transform = ""; }, 150);
    }
    
    // handle Yes answer -> huge celebration, fireworks, love message
    function celebrateYes() {
      // disable both buttons to prevent double click mess
      yesBtn.disabled = true;
      noBtn.disabled = true;
      
      // start powerful confetti storm
      startConfetti(5000);
      // also add extra burst at 0.8s, 2s
      setTimeout(() => { startConfetti(2500); }, 800);
      setTimeout(() => { startConfetti(2000); }, 2200);
      
      const lovelyMessage = `✨ YAY! You just made me the happiest person ever! ✨ <br> ❤️ I can't wait to share sweet moments with you ❤️ <br> 🎉💖 Thank you, ${defaultName}! 💖🎉`;
      responseDiv.innerHTML = lovelyMessage;
      responseDiv.style.background = "#ffeef4";
      responseDiv.style.fontSize = "1.25rem";
      
      // add a floating heart effect in response
      const extraHeart = document.createElement('div');
      extraHeart.innerHTML = "💖💗💖💗💖";
      extraHeart.style.fontSize = "2rem";
      extraHeart.style.marginTop = "10px";
      responseDiv.appendChild(extraHeart);
      
      // hide no button? not necessary, but disabled is fine, can hide maybe friendly
      noBtn.style.opacity = "0.5";
      yesBtn.innerText = "💞 Forever Yes 💞";
      // extra text
      const loveRow = document.querySelector('.extra-love');
      if(loveRow) loveRow.innerHTML = "💐💘 YOU & ME  💘💐";
    }
    
    // No button multiple times gives playful rejection with hints to click Yes
    function handleNo() {
      if (yesBtn.disabled) return; // if already yes'd, no effect
      noClickCount++;
      // if they click no more than 3 times, we change the "No" text to "Wait! maybe Yes?" 
      if (noClickCount >= 3) {
        noBtn.innerText = "🤗 Click Yes! 🤗";
        // after certain count, gently force? not force but encourage
        if(noClickCount === 5) {
          responseDiv.innerHTML = `<span>💗 Okay, but my offer stands forever. Would you reconsider? 💗<br>❤️ The Yes button is waiting ❤️</span>`;
        } else {
          updateNoResponse();
        }
        // if noClickCount > 6, extra gentle nudge
        if (noClickCount >= 7) {
          responseDiv.innerHTML = `<span>💞 I'm not giving up! You're worth it 💞 💖 Click Yes and get a lifetime of happiness 💖</span>`;
        }
      } else {
        updateNoResponse();
      }
      
      // move no button slight wiggle (fun)
      noBtn.style.transform = "translateX(3px)";
      setTimeout(() => { if(noBtn) noBtn.style.transform = ""; }, 200);
      
      // if they approach many no's, still enable yes anyway, but small confetti burst for fun? actually add mini glitter
      if (noClickCount === 2) {
        // first time no? soft sparkle to show hope
        startConfetti(900);
      }
      if (noClickCount === 4) {
        startConfetti(1300);
        responseDiv.innerHTML += `<span style="display:block; font-size:0.9rem;">💫 destiny made us meet 💫</span>`;
      }
    }
    
    // reset behavior but since we need consistent, add also option to change "no" after many clicks to suggest.
    // For accessibility: we also include an optional reset of the name? not needed, but we can let user double tap? no
    
    // also for fun, if you want to edit "crush name" via query param or just keep as editable variable: 
    // allow custom name from url? extra nice touch (optional)
    const urlParams = new URLSearchParams(window.location.search);
    const customName = urlParams.get('name');
    if (customName && customName.trim().length > 0) {
      crushNameSpan.innerText = decodeURIComponent(customName.slice(0, 20));
    } else {
      // keep default romantic name variation
      crushNameSpan.innerText = "My Darling";
    }
    
    // buttons event listeners
    yesBtn.addEventListener('click', celebrateYes);
    noBtn.addEventListener('click', handleNo);
    
    // if user accidentally taps multiple times on no we prevent double celebration but fine.
    // nice extra: present some initial floating hearts on load? small welcome confetti? light
    window.addEventListener('load', () => {
      // tiny gentle confetti sprinkles to welcome
      setTimeout(() => {
        startConfetti(1200);
      }, 400);
      // set initial message cute
      responseDiv.innerHTML = `<span>💌 my heart is skipping a beat... 💌</span>`;
    });
    
    // mobile tap optimization: avoid 300ms delay
    if ('ontouchstart' in window) {
      yesBtn.style.touchAction = 'manipulation';
      noBtn.style.touchAction = 'manipulation';
    }
    
    // To respect the "No" but still keep proposal engaging, we also add animation on card entrance?
    // no extra needed.
    
    // final: if yes already pressed, we prevent further no
    // also a safe fallback for canvas context lost.
  })();
</script>
</body>
</html>
